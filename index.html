    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: '#4A90E2',
              secondary: '#FF9500',
              dark: '#0f172a',
              light: '#f8fafc',

            fontFamily: {

            },
          },
        },
      };

    <!-- Fonts -->

    />

      body {
        font-family: 'Be Vietnam Pro', sans-serif;
        background-color: #f8fafc;
      }
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
